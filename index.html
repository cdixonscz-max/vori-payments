<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vori Payments Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0D0D1A;font-family:'DM Sans',sans-serif;color:#F0F0FF;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    input[type=number]{-moz-appearance:textfield;}
    input::placeholder{color:#2A2A50;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .fade{animation:fadeIn 0.3s ease;}
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:#13132A;}
    ::-webkit-scrollbar-thumb{background:#2A2A50;border-radius:3px;}
    @media(max-width:700px){.two-col{grid-template-columns:1fr!important;}.three-col{grid-template-columns:1fr 1fr!important;}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useRef}=React;
const C={bg:"#0D0D1A",sur:"#13132A",alt:"#1A1A30",bdr:"#2A2A50",pur:"#8B5CF6",pdim:"#7C3AED",pbg:"rgba(139,92,246,0.08)",txt:"#F0F0FF",mut:"#9B9BC4",sub:"#4A4A78",grn:"#22c55e",red:"#EF4444",yel:"#F59E0B",wht:"#FFFFFF"};
const f$=v=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(v||0);
const fp=(v,d=3)=>(!v||isNaN(v)||!isFinite(v))?"—":`${Number(v).toFixed(d)}%`;
const n=v=>parseFloat(v)||0;

const MCC={avgRate:2.1,note:"Visa/MC typically charge ~1.43–1.58% interchange for MCC 5311 consumer cards. Debit cards run lower (~0.05% + $0.21 regulated). Effective rate above 2.5% likely means high markup or tiered pricing."};

function rateColor(r){
  if(!r||r===0)return C.mut;
  if(r<1.8)return"#4ADE80";
  if(r<2.2)return"#86EFAC";
  if(r<2.8)return C.yel;
  if(r<3.5)return"#FB923C";
  return C.red;
}
function rateLabel(r){
  if(!r||r===0)return"—";
  if(r<1.8)return"Excellent ✦";
  if(r<2.2)return"Good";
  if(r<2.8)return"Average";
  if(r<3.5)return"High ⚠";
  return"Very High ⛔";
}

function calcS(s){
  const v=n(s.vol),t=n(s.txn),d=n(s.disc),tf=n(s.txnf),m=n(s.mnth),c=n(s.cb),o=n(s.oth);
  const tot=d+tf+m+c+o,proc=d+tf,fix=m+c+o;
  const er=v>0?(tot/v)*100:0,pr=v>0?(proc/v)*100:0;
  const cpt=t>0?tot/t:0,avg=t>0&&v>0?v/t:0;
  return{v,t,tot,proc,fix,er,pr,cpt,avg,d,tf,m,c,o};
}

async function parseAI(b64,mime){
  const res=await fetch("/api/parse",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({fileBase64:b64,mimeType:mime})});
  const text=await res.text();
  if(!res.ok)throw new Error(text);
  try{return JSON.parse(text);}catch(e){throw new Error("Invalid response: "+text.substring(0,200));}
}

async function toB64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
}

// ---- UI primitives ----
const SH=({icon,title})=>(
  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:"0.9rem",paddingBottom:"0.5rem",borderBottom:`1px solid ${C.bdr}`}}>
    <span style={{fontSize:"0.82rem"}}>{icon}</span>
    <h3 style={{margin:0,fontSize:"0.63rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mut}}>{title}</h3>
  </div>
);

function Fld({label,pre,suf,val,set,hint}){
  const[foc,setFoc]=useState(false);
  return(
    <div style={{marginBottom:"0.85rem"}}>
      {label&&<p style={{margin:"0 0 4px",fontSize:"0.63rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.mut}}>{label}</p>}
      <div style={{display:"flex",alignItems:"center",background:C.bg,border:`1px solid ${foc?C.pur+"80":C.bdr}`,borderRadius:6,overflow:"hidden",transition:"border-color 0.2s"}}>
        {pre&&<span style={{padding:"0 8px",color:C.sub,fontSize:"0.8rem",fontFamily:"monospace"}}>{pre}</span>}
        <input type="number" min="0" step="any" value={val} onChange={e=>set&&set(e.target.value)}
          onFocus={()=>setFoc(true)} onBlur={()=>setFoc(false)} placeholder="0"
          style={{flex:1,background:"transparent",border:"none",outline:"none",color:C.txt,fontSize:"0.88rem",fontFamily:"'DM Mono',monospace",padding:"8px 6px"}}/>
        {suf&&<span style={{padding:"0 8px",color:C.sub,fontSize:"0.78rem"}}>{suf}</span>}
      </div>
      {hint&&<p style={{margin:"2px 0 0",fontSize:"0.62rem",color:C.sub}}>{hint}</p>}
    </div>
  );
}

const KPI=({label,val,sub,accent,hero,color})=>(
  <div style={{background:accent?"linear-gradient(135deg,#3b1f8c,#1e0e5c)":C.alt,border:`1px solid ${accent?C.pur+"50":C.bdr}`,borderRadius:10,padding:hero?"1.3rem":"0.9rem",position:"relative",overflow:"hidden"}}>
    {accent&&<div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:"rgba(139,92,246,0.07)"}}/>}
    <p style={{margin:0,fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:accent?C.pur+"cc":C.mut}}>{label}</p>
    <p style={{margin:"4px 0 0",fontSize:hero?"1.8rem":"1.2rem",fontWeight:800,color:color||(accent?C.pur:C.txt),fontFamily:"'DM Mono',monospace",lineHeight:1}}>{val}</p>
    {sub&&<p style={{margin:"3px 0 0",fontSize:"0.65rem",color:accent?C.pur+"99":C.sub}}>{sub}</p>}
  </div>
);

function Bar({label,val,total,color}){
  const pct=total>0?(val/total)*100:0;
  return(
    <div style={{marginBottom:"0.75rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
        <span style={{fontSize:"0.71rem",color:C.mut}}>{label}</span>
        <div style={{display:"flex",gap:12}}>
          <span style={{fontSize:"0.71rem",color:C.sub}}>{val>0?`${pct.toFixed(1)}%`:"—"}</span>
          <span style={{fontSize:"0.71rem",fontFamily:"monospace",color:C.txt,minWidth:68,textAlign:"right"}}>{val>0?f$(val):"—"}</span>
        </div>
      </div>
      <div style={{height:4,background:C.bdr,borderRadius:2,overflow:"hidden"}}>
        <div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:color,borderRadius:2,transition:"width 0.5s ease"}}/>
      </div>
    </div>
  );
}

function TrendChart({statements}){
  const valid=statements.filter(s=>n(s.vol)>0);
  if(valid.length<2)return null;
  const maxRate=Math.max(...valid.map(s=>calcS(s).er));
  return(
    <div style={{background:C.sur,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"1.2rem",marginBottom:"1.2rem"}}>
      <SH icon="📈" title="Effective Rate Trend"/>
      <div style={{display:"flex",alignItems:"flex-end",gap:8,height:90}}>
        {valid.map((s,i)=>{
          const{er}=calcS(s);
          const pct=maxRate>0?(er/maxRate)*100:0;
          const col=rateColor(er);
          return(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:"0.6rem",color:col,fontFamily:"monospace"}}>{fp(er,2)}</span>
              <div style={{width:"100%",background:col+"30",borderRadius:"4px 4px 0 0",height:`${Math.max(pct,8)}%`,borderBottom:`2px solid ${col}`}}/>
              <span style={{fontSize:"0.6rem",color:C.sub,whiteSpace:"nowrap"}}>{s.label||`S${i+1}`}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CompareTable({statements}){
  const valid=statements.filter(s=>n(s.vol)>0);
  if(valid.length<2)return null;
  const rows=[
    {label:"Volume",fn:s=>f$(calcS(s).v)},
    {label:"Transactions",fn:s=>calcS(s).t>0?calcS(s).t.toLocaleString():"—"},
    {label:"Total Fees",fn:s=>f$(calcS(s).tot)},
    {label:"Effective Rate",fn:s=>fp(calcS(s).er),hi:true},
    {label:"Processing Rate",fn:s=>fp(calcS(s).pr)},
    {label:"Cost Per Txn",fn:s=>calcS(s).cpt>0?f$(calcS(s).cpt):"—"},
    {label:"Avg Ticket",fn:s=>calcS(s).avg>0?f$(calcS(s).avg):"—"},
    {label:"Discount Fees",fn:s=>f$(calcS(s).d)},
    {label:"Per-Txn Fees",fn:s=>f$(calcS(s).tf)},
    {label:"Monthly Fees",fn:s=>f$(calcS(s).m)},
    {label:"Chargeback Fees",fn:s=>f$(calcS(s).c)},
  ];
  return(
    <div style={{background:C.sur,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"1.2rem",marginBottom:"1.2rem",overflowX:"auto"}}>
      <SH icon="🔀" title="Statement Comparison"/>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.74rem"}}>
        <thead>
          <tr>
            <th style={{textAlign:"left",padding:"6px 8px",color:C.mut,fontWeight:600,borderBottom:`1px solid ${C.bdr}`}}>Metric</th>
            {valid.map((s,i)=>(
              <th key={i} style={{textAlign:"right",padding:"6px 8px",color:C.pur,fontWeight:700,borderBottom:`1px solid ${C.bdr}`,whiteSpace:"nowrap"}}>{s.label||`Statement ${i+1}`}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((row,ri)=>{
            const vals=valid.map(s=>row.fn(s));
            return(
              <tr key={ri} style={{background:ri%2===0?"transparent":C.alt+"60"}}>
                <td style={{padding:"6px 8px",color:C.mut}}>{row.label}</td>
                {vals.map((v,vi)=>(
                  <td key={vi} style={{textAlign:"right",padding:"6px 8px",fontFamily:"monospace",color:row.hi?rateColor(calcS(valid[vi]).er):C.txt,fontWeight:row.hi?700:400}}>{v}</td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function StatementPanel({stmt,index,onChange,onRemove}){
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[drag,setDrag]=useState(false);
  const[showMCC,setShowMCC]=useState(false);
  const fileRef=useRef();
  const calc=calcS(stmt);
  const set=key=>val=>onChange({[key]:val});

  const processFile=async(file)=>{
    if(!file)return;
    const ok=["application/pdf","image/png","image/jpeg","image/jpg","image/webp"];
    if(!ok.includes(file.type)){setErr("Upload a PDF or image (PNG, JPG, WEBP).");return;}
    setErr("");setLoading(true);
    try{
      const b64=await toB64(file);
      const r=await parseAI(b64,file.type);
      const u={fname:file.name};
      if(r.totalVolume)u.vol=String(r.totalVolume);
      if(r.transactionCount)u.txn=String(r.transactionCount);
      if(r.discountFees)u.disc=String(r.discountFees);
      if(r.transactionFees)u.txnf=String(r.transactionFees);
      if(r.monthlyFees)u.mnth=String(r.monthlyFees);
      if(r.chargebackFees)u.cb=String(r.chargebackFees);
      if(r.otherFees)u.oth=String(r.otherFees);
      if(r.pricingModel&&r.pricingModel!=="unknown")u.pm=r.pricingModel;
      if(r.icMarkupPct)u.icp=String(r.icMarkupPct);
      if(r.icMarkupPerTxn)u.icpt=String(r.icMarkupPerTxn);
      if(r.notes)u.notes=r.notes;
      onChange(u);
    }catch(e){setErr("Error: "+e.message);}
    finally{setLoading(false);}
  };

  const rating={t:rateLabel(calc.er),c:rateColor(calc.er)};

  return(
    <div className="fade" style={{background:C.sur,border:`1px solid ${C.bdr}`,borderRadius:16,overflow:"hidden"}}>
      {/* Panel header */}
      <div style={{background:C.alt,padding:"0.85rem 1.1rem",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:22,height:22,borderRadius:5,background:C.pbg,border:`1px solid ${C.pur}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.68rem",fontWeight:800,color:C.pur}}>{index+1}</div>
          <input value={stmt.label||""} onChange={e=>onChange({label:e.target.value})} placeholder={`Statement ${index+1} — e.g. "Dec 2024"`}
            style={{background:"transparent",border:"none",outline:"none",color:C.txt,fontSize:"0.82rem",fontWeight:600,minWidth:160}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {calc.er>0&&<span style={{fontSize:"0.73rem",fontWeight:800,fontFamily:"monospace",color:rating.c}}>{fp(calc.er,2)} · {rating.t}</span>}
          {onRemove&&<button onClick={onRemove} style={{background:"transparent",border:"none",cursor:"pointer",color:C.sub,fontSize:"0.8rem",padding:"2px 6px"}}>✕</button>}
        </div>
      </div>

      <div style={{padding:"1.1rem"}}>
        {/* Upload */}
        <div onClick={()=>fileRef.current?.click()}
          onDrop={e=>{e.preventDefault();setDrag(false);processFile(e.dataTransfer.files[0]);}}
          onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
          style={{border:`2px dashed ${drag?C.pur:loading?C.pur+"60":C.bdr}`,borderRadius:10,padding:"1rem",textAlign:"center",background:drag?C.pbg:"transparent",cursor:"pointer",marginBottom:"1rem",transition:"all 0.2s"}}>
          <input ref={fileRef} type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>
          {loading?(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <div style={{width:16,height:16,border:`2px solid ${C.pur}30`,borderTop:`2px solid ${C.pur}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
              <span style={{fontSize:"0.75rem",color:C.pur,fontWeight:600}}>AI reading statement…</span>
            </div>
          ):stmt.fname?(
            <div>
              <p style={{margin:0,fontSize:"0.75rem",color:C.pur,fontWeight:700}}>✅ {stmt.fname}</p>
              <p style={{margin:"3px 0 0",fontSize:"0.68rem",color:C.sub}}>Click to replace</p>
            </div>
          ):(
            <div>
              <div style={{fontSize:"1.4rem",marginBottom:6}}>📄</div>
              <p style={{margin:0,fontSize:"0.75rem",color:C.txt,fontWeight:700}}>Upload Merchant Statement</p>
              <p style={{margin:"4px 0 0",fontSize:"0.68rem",color:C.mut}}>Drag & drop or click — PDF, PNG, JPG</p>
              <div style={{marginTop:8,display:"inline-block",background:C.pbg,border:`1px solid ${C.pur}40`,borderRadius:7,padding:"5px 14px",fontSize:"0.72rem",fontWeight:700,color:C.pur}}>Choose File</div>
            </div>
          )}
        </div>

        {err&&<div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,padding:"0.6rem 0.8rem",marginBottom:"0.8rem",fontSize:"0.72rem",color:"#FCA5A5"}}>⚠️ {err}</div>}
        {stmt.notes&&<div style={{background:C.pbg,border:`1px solid ${C.pur}25`,borderRadius:8,padding:"0.6rem 0.8rem",marginBottom:"0.8rem",fontSize:"0.7rem",color:C.pur}}>✦ <strong>AI:</strong> {stmt.notes}</div>}

        {/* Volume & Transactions */}
        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 1rem"}}>
          <Fld label="Monthly Volume" pre="$" val={stmt.vol} set={set("vol")} hint="Total gross sales"/>
          <Fld label="# Transactions" val={stmt.txn} set={set("txn")} hint="Total transaction count"/>
        </div>
        {calc.avg>0&&(
          <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:C.alt,borderRadius:7,marginBottom:"0.85rem"}}>
            <span style={{fontSize:"0.7rem",color:C.mut}}>Average Ticket</span>
            <span style={{fontSize:"0.7rem",fontFamily:"monospace",color:C.pur,fontWeight:700}}>{f$(calc.avg)}</span>
          </div>
        )}

        {/* Pricing Model */}
        <p style={{margin:"0 0 6px",fontSize:"0.63rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.mut}}>Pricing Model</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.5rem",marginBottom:"0.85rem"}}>
          {[{id:"interchange_plus",label:"Interchange+",icon:"⚡"},{id:"flat_rate",label:"Flat Rate",icon:"▬"},{id:"tiered",label:"Tiered",icon:"◈"}].map(({id,label,icon})=>(
            <div key={id} onClick={()=>onChange({pm:stmt.pm===id?"":id})}
              style={{cursor:"pointer",borderRadius:9,padding:"0.7rem 0.5rem",textAlign:"center",background:stmt.pm===id?C.pbg:C.alt,border:`1.5px solid ${stmt.pm===id?C.pur:C.bdr}`,transition:"all 0.15s"}}>
              <div style={{fontSize:"0.9rem",marginBottom:2}}>{icon}</div>
              <div style={{fontSize:"0.67rem",fontWeight:700,color:stmt.pm===id?C.pur:C.txt}}>{label}</div>
            </div>
          ))}
        </div>
        {stmt.pm==="interchange_plus"&&(
          <div style={{background:C.alt,borderRadius:9,padding:"0.9rem",marginBottom:"0.85rem"}}>
            <p style={{margin:"0 0 0.5rem",fontSize:"0.65rem",fontWeight:700,color:C.pur,letterSpacing:"0.08em",textTransform:"uppercase"}}>⚡ Your Markup Over Interchange</p>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 0.8rem"}}>
              <Fld label="Markup Rate" suf="%" val={stmt.icp} set={set("icp")} hint="e.g. 0.30"/>
              <Fld label="Markup Per-Txn" pre="$" val={stmt.icpt} set={set("icpt")} hint="e.g. 0.10"/>
            </div>
          </div>
        )}
        {stmt.pm==="tiered"&&(
          <div style={{background:"rgba(251,146,60,0.06)",border:"1px solid rgba(251,146,60,0.2)",borderRadius:9,padding:"0.7rem 0.9rem",marginBottom:"0.85rem",fontSize:"0.7rem",color:"#FB923C"}}>
            ⚠️ Tiered pricing is the least transparent model. Ask your processor for Interchange Plus — it's almost always cheaper.
          </div>
        )}

        {/* Fees */}
        <SH icon="🧾" title="Fees from Statement"/>
        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 1rem"}}>
          <Fld label="Discount / Interchange" pre="$" val={stmt.disc} set={set("disc")} hint="% of volume fees"/>
          <Fld label="Per-Transaction Fees" pre="$" val={stmt.txnf} set={set("txnf")} hint="Per-item fees"/>
          <Fld label="Monthly Fixed Fees" pre="$" val={stmt.mnth} set={set("mnth")} hint="Statement, PCI, gateway"/>
          <Fld label="Chargeback Fees" pre="$" val={stmt.cb} set={set("cb")} hint="Dispute & retrieval fees"/>
        </div>
        <Fld label="Other Fees" pre="$" val={stmt.oth} set={set("oth")} hint="Any additional charges"/>

        {/* Per-statement KPIs */}
        {calc.tot>0&&(
          <div>
            <div className="three-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.6rem",marginBottom:"0.6rem"}}>
              <KPI label="Effective Rate" val={fp(calc.er)} color={rateColor(calc.er)} accent/>
              <KPI label="Total Fees" val={f$(calc.tot)}/>
              <KPI label="Cost / Txn" val={calc.cpt>0?f$(calc.cpt):"—"}/>
            </div>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem",marginBottom:"0.6rem"}}>
              <KPI label="Processing Rate" val={fp(calc.pr)} sub="Variable fees only"/>
              <KPI label="Fixed Fees" val={f$(calc.fix)} sub="Monthly + chargebacks"/>
            </div>
            {/* Fee bars */}
            <div style={{background:C.alt,borderRadius:10,padding:"0.9rem",marginBottom:"0.6rem"}}>
              <p style={{margin:"0 0 0.7rem",fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.mut}}>Fee Breakdown</p>
              <Bar label="Discount / Interchange" val={calc.d} total={calc.tot} color="#8B5CF6"/>
              <Bar label="Per-Transaction Fees" val={calc.tf} total={calc.tot} color="#A78BFA"/>
              <Bar label="Monthly Fixed Fees" val={calc.m} total={calc.tot} color="#60A5FA"/>
              <Bar label="Chargeback Fees" val={calc.c} total={calc.tot} color="#F472B6"/>
              <Bar label="Other Fees" val={calc.o} total={calc.tot} color="#94A3B8"/>
            </div>
            {/* MCC benchmark */}
            <div style={{background:C.alt,borderRadius:10,padding:"0.9rem",cursor:"pointer"}} onClick={()=>setShowMCC(!showMCC)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.mut}}>🏬 vs. MCC 5311 Benchmark</span>
                <span style={{fontSize:"0.65rem",color:C.sub}}>{showMCC?"▲":"▼"}</span>
              </div>
              <div style={{position:"relative",height:5,background:C.bdr,borderRadius:3,marginBottom:5}}>
                <div style={{position:"absolute",left:`${Math.min((MCC.avgRate/5)*100,100)}%`,top:-4,width:2,height:13,background:C.yel,borderRadius:1}}/>
                <div style={{width:`${Math.min((calc.er/5)*100,100)}%`,height:"100%",background:rateColor(calc.er),borderRadius:3}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.62rem"}}>
                <span style={{color:rateColor(calc.er)}}>Your rate: {fp(calc.er,2)}</span>
                <span style={{color:C.yel}}>Benchmark: ~{MCC.avgRate}%</span>
              </div>
              {calc.er>MCC.avgRate&&<p style={{marginTop:"0.4rem",fontSize:"0.67rem",color:"#FB923C"}}>⚠️ {fp(calc.er-MCC.avgRate,2)} above benchmark — ~{f$((calc.er-MCC.avgRate)/100*calc.v)}/mo potential overcharge</p>}
              {showMCC&&(
                <div className="fade" style={{marginTop:"0.7rem",paddingTop:"0.7rem",borderTop:`1px solid ${C.bdr}`}}>
                  <p style={{margin:"0 0 6px",fontSize:"0.68rem",fontWeight:700,color:C.txt}}>MCC 5311 Interchange Benchmarks:</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.4rem"}}>
                    {[["Visa Consumer Credit","1.43–1.58% + $0.10"],["Visa Debit (regulated)","0.05% + $0.21"],["MC Consumer Credit","1.48–1.58% + $0.10"],["MC Debit (regulated)","0.05% + $0.21"],["Visa Debit (unreg.)","0.80% + $0.15"],["Amex OptBlue","1.35–2.40% + varies"]].map(([name,rate])=>(
                      <div key={name} style={{background:C.bg,borderRadius:6,padding:"0.4rem 0.6rem"}}>
                        <div style={{color:C.txt,fontSize:"0.67rem",fontWeight:600}}>{name}</div>
                        <div style={{color:C.pur,fontFamily:"monospace",fontSize:"0.65rem"}}>{rate}</div>
                      </div>
                    ))}
                  </div>
                  <p style={{marginTop:"0.5rem",fontSize:"0.65rem",color:C.sub,lineHeight:1.5}}>{MCC.note}</p>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function emptyStmt(label=""){return{label,fname:"",notes:"",vol:"",txn:"",disc:"",txnf:"",mnth:"",cb:"",oth:"",pm:"",icp:"",icpt:""};}

function App(){
  const[stmts,setStmts]=useState([emptyStmt("Statement 1")]);
  const[tab,setTab]=useState("statements");
  const[qr,setQr]=useState("");
  const[qpt,setQpt]=useState("");

  const upd=(i,u)=>setStmts(p=>p.map((s,idx)=>idx===i?{...s,...u}:s));
  const rem=i=>setStmts(p=>p.filter((_,idx)=>idx!==i));
  const add=()=>setStmts(p=>[...p,emptyStmt(`Statement ${p.length+1}`)]);

  const valid=stmts.filter(s=>n(s.vol)>0);
  const multi=valid.length>=2;

  const totals=useMemo(()=>{
    if(!valid.length)return null;
    const agg=valid.reduce((a,s)=>{
      const c=calcS(s);
      return{v:a.v+c.v,t:a.t+c.t,tot:a.tot+c.tot,d:a.d+c.d,tf:a.tf+c.tf,m:a.m+c.m,c:a.c+c.c,o:a.o+c.o};
    },{v:0,t:0,tot:0,d:0,tf:0,m:0,c:0,o:0});
    const mo=valid.length;
    agg.er=agg.v>0?(agg.tot/agg.v)*100:0;
    agg.pr=agg.v>0?((agg.d+agg.tf)/agg.v)*100:0;
    agg.cpt=agg.t>0?agg.tot/agg.t:0;
    agg.avg=agg.t>0&&agg.v>0?agg.v/agg.t:0;
    agg.mo=mo;
    agg.annV=agg.v/mo*12;
    agg.annF=agg.tot/mo*12;
    return agg;
  },[valid]);

  const qcost=totals&&n(qr)>0?((totals.v/totals.mo)*(n(qr)/100)+(totals.t/totals.mo)*n(qpt)):0;
  const qeff=totals&&qcost>0?(qcost/(totals.v/totals.mo))*100:0;
  const actMo=totals?totals.tot/totals.mo:0;
  const sav=qcost>0?qcost-actMo:null;

  return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"1.5rem 1rem 3rem"}}>
      <div style={{maxWidth:1140,margin:"0 auto"}}>

        {/* HEADER */}
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:"1rem",marginBottom:"1.8rem"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"0.8rem"}}>
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="7" fill={C.pur}/>
                <path d="M7 8l7 12 7-12" stroke="#0D0D1A" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              <span style={{fontSize:"1.15rem",fontWeight:800,color:C.wht}}>vori</span>
              <span style={{width:1,height:16,background:C.bdr}}/>
              <span style={{fontSize:"0.72rem",color:C.mut}}>Payments Analyzer</span>
            </div>
            <span style={{display:"inline-flex",alignItems:"center",gap:6,background:C.pbg,border:`1px solid ${C.pdim}40`,borderRadius:100,padding:"3px 12px",fontSize:"0.63rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.pur}}>✦ Merchant Statement Intelligence</span>
            <h1 style={{margin:"0.6rem 0 0.3rem",fontSize:"clamp(1.6rem,3.5vw,2.4rem)",fontWeight:800,lineHeight:1.08,letterSpacing:"-0.02em"}}>
              Uncover Your True<br/><span style={{color:C.pur}}>Processing Cost</span>
            </h1>
            <p style={{margin:0,color:C.mut,fontSize:"0.85rem"}}>Upload statements — AI extracts every fee. Compare months, spot overcharges.</p>
          </div>
          {totals&&totals.er>0&&(
            <div style={{background:C.sur,border:`1.5px solid ${rateColor(totals.er)}40`,borderRadius:14,padding:"1rem 1.3rem",textAlign:"center",minWidth:150}}>
              <p style={{margin:0,fontSize:"0.58rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mut}}>{multi?"Blended ":""}Effective Rate</p>
              <p style={{margin:"4px 0 2px",fontSize:"1.9rem",fontWeight:800,fontFamily:"monospace",color:rateColor(totals.er),lineHeight:1}}>{fp(totals.er)}</p>
              <p style={{margin:0,fontSize:"0.7rem",color:rateColor(totals.er)}}>{rateLabel(totals.er)}</p>
            </div>
          )}
        </div>

        {/* TABS */}
        {multi&&(
          <div style={{display:"flex",gap:4,marginBottom:"1.2rem",background:C.sur,borderRadius:10,padding:4,width:"fit-content"}}>
            {[{id:"statements",label:"📋 Statements"},{id:"compare",label:"🔀 Compare"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{padding:"6px 16px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.75rem",fontWeight:700,background:tab===t.id?C.pur:"transparent",color:tab===t.id?C.wht:C.mut,transition:"all 0.15s"}}>
                {t.label}
              </button>
            ))}
          </div>
        )}

        {/* COMPARE TAB */}
        {tab==="compare"&&multi&&(
          <div className="fade">
            <TrendChart statements={stmts}/>
            <CompareTable statements={stmts}/>
          </div>
        )}

        {/* STATEMENTS TAB */}
        {(tab==="statements"||!multi)&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(440px,1fr))",gap:"1.2rem",marginBottom:"1.2rem"}}>
              {stmts.map((s,i)=>(
                <StatementPanel key={i} stmt={s} index={i}
                  onChange={u=>upd(i,u)}
                  onRemove={stmts.length>1?()=>rem(i):null}/>
              ))}
            </div>

            <button onClick={add}
              style={{width:"100%",padding:"0.85rem",background:"transparent",border:`2px dashed ${C.bdr}`,borderRadius:14,cursor:"pointer",color:C.sub,fontSize:"0.78rem",fontWeight:600,marginBottom:"1.5rem",transition:"all 0.2s"}}
              onMouseEnter={e=>{e.target.style.borderColor=C.pur;e.target.style.color=C.pur;}}
              onMouseLeave={e=>{e.target.style.borderColor=C.bdr;e.target.style.color=C.sub;}}>
              + Add Another Statement
            </button>

            {/* SUMMARY */}
            {totals&&(
              <div className="fade">
                <div style={{marginBottom:"1rem",paddingBottom:"0.5rem",borderBottom:`1px solid ${C.bdr}`}}>
                  <h2 style={{margin:0,fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mut}}>
                    {multi?"📊 Blended Summary — All Statements":"📊 Summary"}
                  </h2>
                </div>

                <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.2rem"}}>
                  {/* LEFT */}
                  <div style={{display:"flex",flexDirection:"column",gap:"1.1rem"}}>
                    {/* True Cost */}
                    <div style={{background:C.sur,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"1.2rem"}}>
                      <SH icon="💡" title="Your True Cost"/>
                      <div style={{display:"grid",gap:"0.6rem"}}>
                        <KPI label={multi?"Blended Effective Rate":"Effective Rate — All In"} val={fp(totals.er)} color={rateColor(totals.er)} accent hero/>
                        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
                          <KPI label="Processing Rate" val={fp(totals.pr)} sub="Variable fees only"/>
                          <KPI label="Cost Per Transaction" val={totals.cpt>0?f$(totals.cpt):"—"}/>
                        </div>
                        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
                          <KPI label={multi?"Avg Monthly Fees":"Total Fees Paid"} val={f$(totals.tot/totals.mo)} sub="This period"/>
                          <KPI label="Avg Ticket" val={totals.avg>0?f$(totals.avg):"—"} sub="Vol ÷ transactions"/>
                        </div>
                        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
                          <KPI label="Annual Volume (proj)" val={f$(totals.annV)}/>
                          <KPI label="Annual Fees (proj)" val={f$(totals.annF)}/>
                        </div>
                      </div>
                    </div>

                    {/* Quoted vs Actual */}
                    <div style={{background:C.sur,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"1.2rem"}}>
                      <SH icon="⚖️" title="Compare to Quoted Rate"/>
                      <Fld label="Quoted Rate" suf="%" val={qr} set={setQr} hint="e.g. 2.5"/>
                      <Fld label="Quoted Per-Transaction Fee" pre="$" val={qpt} set={setQpt} hint="e.g. 0.10"/>
                      {qcost>0&&(
                        <div className="fade">
                          <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem",marginBottom:"0.6rem"}}>
                            <div style={{background:C.alt,borderRadius:9,padding:"0.8rem"}}>
                              <p style={{margin:0,fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.mut}}>Quoted Cost</p>
                              <p style={{margin:"3px 0 0",fontSize:"1.1rem",fontWeight:800,fontFamily:"monospace",color:C.mut}}>{f$(qcost)}</p>
                              <p style={{margin:"2px 0 0",fontSize:"0.66rem",color:C.sub}}>{fp(qeff,2)} effective</p>
                            </div>
                            <div style={{background:C.alt,borderRadius:9,padding:"0.8rem"}}>
                              <p style={{margin:0,fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.mut}}>Actual Cost</p>
                              <p style={{margin:"3px 0 0",fontSize:"1.1rem",fontWeight:800,fontFamily:"monospace",color:C.txt}}>{f$(actMo)}</p>
                              <p style={{margin:"2px 0 0",fontSize:"0.66rem",color:C.sub}}>{fp(totals.er,2)} effective</p>
                            </div>
                          </div>
                          {sav!==null&&(
                            <div style={{background:sav>0?"rgba(239,68,68,0.08)":"rgba(34,197,94,0.08)",border:`1px solid ${sav>0?"rgba(239,68,68,0.3)":"rgba(34,197,94,0.3)"}`,borderRadius:9,padding:"0.7rem 0.9rem",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                              <span style={{fontSize:"0.73rem",color:sav>0?"#FCA5A5":"#86EFAC"}}>{sav>0?"⚠️ Paying MORE than quoted":"✅ Paying LESS than quoted"}</span>
                              <span style={{fontFamily:"monospace",fontWeight:800,fontSize:"0.95rem",color:sav>0?C.red:C.grn,whiteSpace:"nowrap"}}>{sav>0?"+":"-"}{f$(Math.abs(sav))}/mo</span>
                            </div>
                          )}
                          {sav>0&&<p style={{marginTop:"0.45rem",fontSize:"0.67rem",color:C.sub}}>Annual overcharge: <strong style={{color:C.red}}>{f$(sav*12)}</strong></p>}
                        </div>
                      )}
                    </div>
                  </div>

                  {/* RIGHT */}
                  <div style={{display:"flex",flexDirection:"column",gap:"1.1rem"}}>
                    {/* Fee breakdown */}
                    <div style={{background:C.sur,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"1.2rem"}}>
                      <SH icon="📋" title={multi?"Fee Breakdown — All Periods":"Fee Breakdown"}/>
                      <Bar label="Discount / Interchange" val={totals.d} total={totals.tot} color="#8B5CF6"/>
                      <Bar label="Per-Transaction Fees" val={totals.tf} total={totals.tot} color="#A78BFA"/>
                      <Bar label="Monthly Fixed Fees" val={totals.m} total={totals.tot} color="#60A5FA"/>
                      <Bar label="Chargeback Fees" val={totals.c} total={totals.tot} color="#F472B6"/>
                      <Bar label="Other Fees" val={totals.o} total={totals.tot} color="#94A3B8"/>
                      <div style={{marginTop:"0.85rem",paddingTop:"0.65rem",borderTop:`1px solid ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:"0.75rem",fontWeight:700,color:C.txt}}>Total {multi?"(all periods)":""}</span>
                        <span style={{fontFamily:"monospace",fontWeight:800,color:C.pur}}>{f$(totals.tot)}</span>
                      </div>
                      {multi&&(
                        <div style={{marginTop:"0.3rem",display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:"0.69rem",color:C.sub}}>Monthly average</span>
                          <span style={{fontFamily:"monospace",fontSize:"0.77rem",color:C.mut}}>{f$(totals.tot/totals.mo)}</span>
                        </div>
                      )}
                    </div>

                    {/* Annualized */}
                    <div style={{background:C.sur,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"1.2rem"}}>
                      <SH icon="📅" title="Annualized Projections"/>
                      <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
                        <KPI label="Annual Volume" val={f$(totals.annV)}/>
                        <KPI label="Annual Fees" val={f$(totals.annF)}/>
                      </div>
                      {sav>0&&(
                        <div style={{marginTop:"0.7rem",padding:"0.7rem 0.9rem",background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:9}}>
                          <p style={{margin:0,fontSize:"0.7rem",color:"#FCA5A5"}}>At current overcharge rate:</p>
                          <p style={{margin:"3px 0 0",fontFamily:"monospace",fontWeight:800,color:C.red,fontSize:"1rem"}}>{f$(sav*12)}/year excess fees</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        <p style={{textAlign:"center",marginTop:"2rem",fontSize:"0.6rem",color:C.sub}}>
          MCC 5311 · Effective rate = total fees ÷ total volume · Vori Payments Intelligence
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
